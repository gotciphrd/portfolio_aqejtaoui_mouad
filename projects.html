<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Sekuya&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <header style="background-color: #3a304d;">
        <h1><a href="index.html" class="nav">My Portfolio</a></h1>
        <nav>
            <ul>
                <li><a href="index.html#projects" class="nav">Projects</a></li>
                <li><a href="#about" class="nav">About Me</a></li>
                <li><a href="#contact" class="nav">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="projects">
        <h1 id="sec-title">All Projects</h1>
        <div id="projects-container" class="projects-container"></div>
    </section>

    <script>
        // Override the ProjectUI to show all projects
        const AllProjectsUI = {
            container: null,

            init() {
                this.container = document.getElementById('projects-container');
                this.render();
            },

            render() {
                const projects = ProjectDB.getAll();

                if (projects.length === 0) {
                    this.container.innerHTML = '<div class="empty-state">No projects yet.</div>';
                    return;
                }

                // Show all projects
                this.container.innerHTML = projects
                    .map(project => this.createCard(project))
                    .join('');
            },

            createCard(project) {
                const imageUrl = project.image || 'assets/logo.png';
                
                return `
                    <div class="project-card">
                        <img src="${this.escapeHtml(imageUrl)}" alt="${this.escapeHtml(project.name)}" class="project-image" onerror="this.src='assets/logo.png'">
                        <div class="project-content">
                            <h3 class="project-title">${this.escapeHtml(project.name)}</h3>
                            <p class="project-desc">${this.escapeHtml(project.description)}</p>
                            
                            ${project.tech && project.tech.length > 0 ? `
                                <div class="project-tech-list">
                                    ${project.tech.map(t => `<span class="tech-badge">${this.escapeHtml(t)}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            },

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }
        };
    </script>
</body>
</html>
